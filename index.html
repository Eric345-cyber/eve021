<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send USDT - Exact Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS RESET & VARIABLES */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #0E0E0E;
            --surface-color: #18191A;
            --text-main: #FFFFFF;
            --text-muted: #8E8F93;
            --trust-green: #05C46B; /* Exact Trust Wallet Neon Green */
            --trust-green-dim: #10402B; /* Non-active footer button green */
            --border-default: transparent;
            --input-focus: #252627;
        }

        body {
            background-color: #000000;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* App Viewport Emulation */
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 900px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            position: relative;
            overflow: hidden;
        }

        /* Top Header */
        .app-header {
            display: flex;
            align-items: center;
            height: 56px;
            margin-bottom: 20px;
            position: relative;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 40px;
            height: 40px;
        }

        .app-header h1 {
            font-size: 20px;
            font-weight: 600;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        /* Main Form Area */
        .form-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        /* Input Wrappers & Focus System */
        .input-wrapper {
            background-color: var(--surface-color);
            border-radius: 14px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            height: 64px;
            border: 2px solid var(--border-default);
            transition: border-color 0.15s ease, background-color 0.15s ease;
            cursor: text;
        }

        /* Dynamic Border Focus Managed via JS class assignment */
        .input-wrapper.focused {
            border-color: var(--trust-green) !important;
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            height: 100%;
        }

        /* Unselectable state styling for address field */
        .input-wrapper input.read-only-mask {
            user-select: none;
            -webkit-user-select: none;
            pointer-events: none;
            color: var(--text-main);
        }

        .input-wrapper input::placeholder {
            color: #4E4F51;
        }

        /* Action elements inside inputs */
        .input-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-left: 12px;
        }

        .action-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .clear-btn {
            background: #2A2B2D;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            justify-content: center;
            font-size: 11px;
            color: var(--bg-color);
            font-weight: bold;
        }

        .text-action-btn {
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .green-text {
            color: var(--trust-green);
        }

        /* Destination Network Pill Box Selection */
        .dropdown-selector {
            width: max-content;
            background-color: var(--surface-color);
            border: none;
            border-radius: 30px;
            height: 40px;
            padding: 0 14px 0 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .dropdown-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Rendered precise custom SVG representation of the provided BNB Smart Chain Hex Cube */
        .bnb-logo-svg {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
        }

        .network-name {
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
        }

        .dropdown-arrow {
            font-size: 8px;
            color: var(--text-muted);
        }

        /* Value Meta-decorations */
        .currency-label {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 500;
            margin-right: 2px;
        }

        .fiat-estimation {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
            font-weight: 400;
        }

        /* Footer & Conditional Submission Node */
        .app-footer {
            padding-bottom: 10px;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--trust-green-dim);
            color: rgba(255, 255, 255, 0.35);
            border: none;
            border-radius: 28px;
            height: 54px;
            font-size: 16px;
            font-weight: 600;
            cursor: not-allowed;
            transition: all 0.2s ease;
        }

        /* Activated Dynamic Submit Button State */
        .submit-btn.active {
            background-color: var(--trust-green);
            color: #000000;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <button class="back-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12;19 5;12 12;5"></polyline></svg>
            </button>
            <h1>Send USDT</h1>
        </header>

        <main class="form-container">
            
            <div class="input-group">
                <label>Address or Domain Name</label>
                <div class="input-wrapper" id="addressWrapper">
                    <input type="text" class="read-only-mask" value="0xe5f...bbf8eca25" readonly tabindex="-1">
                    <div class="input-actions">
                        <button class="action-icon clear-btn">×</button>
                        <button class="text-action-btn green-text">Paste</button>
                        
                        <button class="action-icon green-text">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        </button>
                        
                        <button class="action-icon green-text">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>Destination network</label>
                <button class="dropdown-selector" id="networkDropdown">
                    <div class="dropdown-left">
                        <div class="bnb-logo-svg">
                            <svg viewBox="0 0 120 120" width="100%" height="100%">
                                <path d="M60,15 L99,37.5 L99,82.5 L60,105 L21,82.5 L21,37.5 Z" fill="none" stroke="#F3BA2F" stroke-width="10" stroke-linejoin="round"/>
                                <path d="M60,38 L79,49 L79,71 L60,82 L41,71 L41,49 Z" fill="#F3BA2F"/>
                                <path d="M60,15 L60,38 M99,37.5 L79,49 M99,82.5 L79,71 M60,105 L60,82 M21,82.5 L41,71 M21,37.5 L41,49" stroke="#0E0E0E" stroke-width="5" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <span class="network-name">BNB Smart Chain</span>
                    </div>
                    <span class="dropdown-arrow">▼</span>
                </button>
            </div>

            <div class="input-group">
                <label>Amount</label>
                <div class="input-wrapper focused" id="amountWrapper">
                    <input type="number" id="amountInput" placeholder="Amount" inputmode="decimal">
                    <div class="input-actions">
                        <span class="currency-label">USDT</span>
                        <button class="text-action-btn green-text">Max</button>
                    </div>
                </div>
                <div class="fiat-estimation">≈ $0.00</div>
            </div>

        </main>

        <footer class="app-footer">
            <button class="submit-btn" id="nextBtn" disabled>Next</button>
        </footer>
    </div>

    <script>
        const addressWrapper = document.getElementById('addressWrapper');
        const amountWrapper = document.getElementById('amountWrapper');
        const amountInput = document.getElementById('amountInput');
        const nextBtn = document.getElementById('nextBtn');

        // Feature 1: Toggle UI Border Highlighting Focus Placement on Container Clicks
        addressWrapper.addEventListener('click', () => {
            amountWrapper.classList.remove('focused');
            addressWrapper.classList.add('focused');
        });

        amountWrapper.addEventListener('click', () => {
            addressWrapper.classList.remove('focused');
            amountWrapper.classList.add('focused');
            amountInput.focus();
        });

        // Ensure natural input focus handles CSS state shifting safely
        amountInput.addEventListener('focus', () => {
            addressWrapper.classList.remove('focused');
            amountWrapper.classList.add('focused');
        });

        // Feature 2: Watch text entries to toggle "Next" button states dynamically
        amountInput.addEventListener('input', (e) => {
            const cleanVal = e.target.value.trim();
            
            if (cleanVal !== "" && parseFloat(cleanVal) > 0) {
                nextBtn.classList.add('active');
                nextBtn.removeAttribute('disabled');
            } else {
                nextBtn.classList.remove('active');
                nextBtn.setAttribute('disabled', 'true');
            }
        });
    </script>
</body>
    </html>
