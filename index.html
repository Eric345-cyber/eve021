<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send USDT Clone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <button class="back-btn" aria-label="Go back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12;19 5;12 12;5"></polyline></svg>
            </button>
            <h1>Send USDT</h1>
            <div class="header-spacer"></div>
        </header>

        <main class="form-container">
            
            <div class="input-group">
                <label>Address or Domain Name</label>
                <div class="input-wrapper focus-gray">
                    <input type="text" value="3B199ac5877d1D" placeholder="Enter address">
                    <div class="input-actions">
                        <button class="action-icon clear-btn">×</button>
                        <button class="text-action-btn green-text">Paste</button>
                        <button class="action-icon img-icon green-text">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                        </button>
                        <button class="action-icon img-icon green-text">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="9"></line><line x1="9" y1="13" x2="15" y2="13"></line><line x1="9" y1="17" x2="15" y2="17"></line></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>Destination network</label>
                <button class="dropdown-selector">
                    <div class="dropdown-left">
                        <span class="crypto-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="#F3BA2F"><path d="M12 0l-3.5 3.5L12 7l3.5-3.5L12 0zM3.5 8.5L0 12l3.5 3.5L7 12 3.5 8.5zm17 0L17 12l3.5 3.5 3.5-3.5-3.5-3.5zM12 17l-3.5 3.5L12 24l3.5-3.5L12 17zM12 9l-3 3 3 3 3-3-3-3z"/></svg>
                        </span>
                        <span class="network-name">BNB Smart Chain</span>
                    </div>
                    <span class="dropdown-arrow">▼</span>
                </button>
            </div>

            <div class="input-group">
                <label>Amount</label>
                <div class="input-wrapper focus-green active-border">
                    <input type="text" placeholder="USDT Amount">
                    <div class="input-actions">
                        <span class="currency-label">USDT</span>
                        <button class="text-action-btn green-text bold-text">Max</button>
                    </div>
                </div>
                <div class="fiat-estimation">≈ $0.00</div>
            </div>

        </main>

        <footer class="app-footer">
            <button class="submit-btn">Next</button>
        </footer>
    </div>

</body>
                                </html>
